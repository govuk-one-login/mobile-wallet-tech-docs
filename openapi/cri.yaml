# This file contains API definitions for both the Credential Issuer (CRI) and Credential Status List (CRS) services.
# Where appropriate, endpoints will be marked as either `cri` or crs` to reflect which service they belong to.
openapi: "3.0.0"
info:
  version: 1.0.0
  title: Wallet Credential Issuer API
  description: This specification describes the 6 credential issuer endpoints required to issue credentials to the GOV.UK Wallet.
  license:
    name: MIT License
paths:
  # `cri`
  /credential_offer:
    get:
      description: An endpoint for issuing a credential offer.
      responses:
        '200':
          description: |-
            Credential offer URL consisting of the following parts:<br>
            1. Wallet’s credential offer endpoint.<br>
            2. A query parameter `credential_offer`.<br>
            3. URL-encoded credential offer.
          content:
            application/json:
              schema:
                type: string
              example: https://mobile.account.gov.uk/wallet/add?credential_offer=%7B%22credential_configuration_ids%22%3A%5B%22FishingLicence%22%5D%2C%22grants%22%3A%7B%22urn%3Aietf%3Aparams%3Aoauth%3Agrant-type%3Apre-authorized_code%22%3A%7B%22pre-authorized_code%22%3A%22eyJraWQiOiI1ZGNiZWU4NjNiNWQ3Y2MzMGM5YmExZjczOTNkYWNjNmMxNjYxMDc4MmU0YjZhMTkxZjk0YTdlOGIxZTE1MTBmIiwidHlwIjoiSldUIiwiYWxnIjoiRVMyNTYifQ.eyJhdWQiOiJodHRwczovL3Rva2VuLmFjY291bnQuZ292LnVrIiwiY2xpZW50SWQiOiJURVNUX0NMSUVOVF9JRCIsImlzcyI6Imh0dHBzOi8vZXhhbXBsZS1jcmVkZW50aWFsLWlzc3Vlci5nb3YudWsiLCJjcmVkZW50aWFsX2lkZW50aWZpZXJzIjpbIjE2NTAwNWYwLTI4YjktNGFhMS05NTM4LTNmZThlZTc0N2Q0YiJdLCJleHAiOjE3Mzk0NTc3ODAsImlhdCI6MTczOTQ1NzQ4MH0.ImEbm6m4IoxW9UD-sPNi4ez26F7qiv5t-g7RFzEtbPegp5jNqulYvlPmRKj-QNBIifgXtrYID9-dHNWOQTybjQ%22%7D%7D%2C%22credential_issuer%22%3A%22https%3A%2F%2Fexample-credential-issuer.gov.uk%22%7D
  # `cri`
  /credential:
    post:
      description: An endpoint used by the GOV.UK Wallet to request a Credential from the Credential Issuer.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialRequestBody'
            example:
              proof:
                proof_type: jwt
                jwt: eyJhbGciOiJFUzI1NiIsInR5cCI6IkpXVCIsImtpZCI6ImRpZDprZXk6ekRuYWVTR2ZTUU1Zdm5MYkxXRXViaGhHRFBvcTdwQTlNTU52dW12YnNtTUNab3ZVUiJ9.eyJpc3MiOiJ1cm46ZmRjOmdvdjp1azp3YWxsZXQiLCJhdWQiOiJodHRwczovL2V4YW1wbGUtY3JlZGVudGlhbC1pc3N1ZXIuZ292LnVrIiwiaWF0IjoxNzM5NDU3NTE3MzU1LCJub25jZSI6ImRiMmRiMzEzLTVjYjktNGJiNC1hYTRkLTlmZTRkYWM0MGJlMSJ9.V_EDG7NNVOLixqScs6CKU99uEL0Rt47GoYW9Kp3UZPoP6COcXKDusvNwZMSdWTb44LoK5QvTMGbrB71y-4lRow
      responses:
        '200':
          description: Credential.
          headers:
            Cache-Control:
              schema:
                type: string
                example: "no-store"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CredentialResponse"
              example:
                credentials:
                  - credential: eyJraWQiOiJkaWQ6d2ViOmV4YW1wbGUtY3JlZGVudGlhbC1pc3N1ZXIuZ292LnVrIzVkY2JlZTg2M2I1ZDdjYzMwYzliYTFmNzM5M2RhY2M2YzE2NjEwNzgyZTRiNmExOTFmOTRhN2U4YjFlMTUxMGYiLCJjdHkiOiJ2YyIsInR5cCI6InZjK2p3dCIsImFsZyI6IkVTMjU2In0..UXGyl9ihcMNn-RlqBe_8rTxvtPDqdaGLKMJs3pk9QL4zgEZbF4LZmeZt-k2p04MSlW8IX8uWKgtxFDOGu9j2rQ
                notification_id: 776aefd4-26c6-4a5f-aa7c-b5e294cd87cd
        '400':
          description: Bad Request
          headers:
            Cache-Control:
              schema:
                type: string
                example: "no-store"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Credential400ErrorResponse"
              example:
                error: invalid_proof
        '401':
          description: Unauthorized
          headers:
            WWW-Authenticate:
              description: Indicates the authentication scheme that should be used to access the resource.
              schema:
                type: string
                example: Bearer error="invalid_token"
            Cache-Control:
              schema:
                type: string
                example: "no-store"
  # `cri`
  /notification:
    post:
      description: An endpoint used by GOV.UK Wallet to notify the credential issuer of events concerning issued credentials.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationRequestBody'
            example:
              notification_id: 776aefd4-26c6-4a5f-aa7c-b5e294cd87cd
              event: credential_accepted
              event_description: Credential has been successfully stored
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
          headers:
            Cache-Control:
              schema:
                type: string
                example: "no-store"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Notification400ErrorResponse"
              example:
                error: invalid_notification_id
        '401':
          description: Unauthorized
          headers:
            WWW-Authenticate:
              description: Indicates the authentication scheme that should be used to access the resource.
              schema:
                type: string
                example: Bearer error="invalid_token"
            Cache-Control:
              schema:
                type: string
                example: "no-store"
  # `crs`
  /issue:
    post:
      description: An endpoint to request a new status index for a GOV.UK wallet credential. This API will use the issuer's `/.well-known/jwks.json` endpoint to locate the signing keys to verify the signature.
      requestBody:
        description: JOSE signed JWT containing Credential Issuer registered status list `client id` and the `expiry date` of the credential they are about to issue in a signed JWT. Status list supports ES256 (elliptic-curve cryptography with curve P-256) signed JWTs.
        required: true
        content:
          application/jwt:
            schema:
              type: string
              description: JOSE signed JWT containing information about the credential issuer and when their credential will expire.
            example: <JWT>
      responses:
        '200':
          description: A response that contains a status index and a uri to the status list where this newly issued `VALID` (binary 00) status index value can be found.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IssueResponse"
              example:
                idx: 3
                uri: "https://crs.account.gov.uk/b/A671FED3E9AD"
        '400':
          description: Bad request (invalid JWT, missing fields, wrong content-type, idempotency conflict, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue400ErrorResponse"
              examples:
                no_body_or_headers:
                  summary: Missing event body or headers
                  value:
                    error: BAD_REQUEST
                    error_description: "No Event Body or Headers Found"
                missing_content_type:
                  summary: Missing Content-Type header
                  value:
                    error: BAD_REQUEST
                    error_description: "Content-Type header must be application/jwt"
                missing_jti:
                  summary: Missing jti in payload
                  value:
                    error: BAD_REQUEST
                    error_description: "No jti in Payload"
                invalid_jti:
                  summary: Invalid jti format
                  value:
                    error: BAD_REQUEST
                    error_description: "The jti claim is not a lower case uuid string"
                missing_status_expiry:
                  summary: Missing statusExpiry in payload
                  value:
                    error: BAD_REQUEST
                    error_description: "No Status Expiry in Payload"
                invalid_status_expiry:
                  summary: Invalid statusExpiry value
                  value:
                    error: BAD_REQUEST
                    error_description: "Status Expiry in Payload must be a non negative number and represent a future expiry date no more than 1 year from now"
                invalid_idempotent_request:
                  summary: Same jti reused with different statusExpiry
                  value:
                    error: BAD_REQUEST
                    error_description: "Detected invalid changes between idempotent requests, unable to proceed. Please generate a new request."
        '401':
          description: Unauthorized (authentication or signature failure)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue401ErrorResponse"
              example:
                error: UNAUTHORIZED
                error_description: "Unauthorized Request"
        '409':
          description: Conflict - concurrent request with the same idempotency key already in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue409ErrorResponse"
              example:
                error: CONFLICT
                error_description: "Multiple concurrent idempotent requests in progress. Please retry after a short delay."
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue500ErrorResponse"
              example:
                error: INTERNAL_SERVER_ERROR
                error_description: "Unable to successfully issue a status"
        '503':
          description: Service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Issue503ErrorResponse"
              example:
                error: TEMPORARILY_UNAVAILABLE
                error_description: "Service is temporarily unavailable"
  # `crs`
  /revoke:
    post:
      description: An endpoint used by GOV.UK Wallet credential issuers to revoke a status list index associated with a GOV.UK Wallet credential that they issued. This API will use the issuer's `/.well-known/jwks.json` endpoint to locate the signing keys to verify the signature.
      requestBody:
        description: JOSE signed JWT containing the wallet Credential Issuer registered status list client id, status index and the URI of the status list with the index. The `idx` and `uri` claims in the request JWT should match exactly what was issued by the status list service at the time of issuance. Status list supports ES256 (elliptic-curve cryptography with curve P-256) signed JWTs. The status list service will only keep associations between credential issuers and indexes issued to the credential issuers. It is the issuers responsibility to keep correlation between credentials and index issued to those credentials.
        required: true
        content:
          application/jwt:
            schema:
              type: string
              description: JOSE signed JWT containing details of the status list `idx` and `uri` that holds the credential to be revoked.
            example: <JWT>
      responses:
        '202':
          description: Revocation processed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevokeResponse"
              example:
                message: "Request processed for revocation"
                revokedAt: 1734709493
        '400':
          description: Bad request (invalid JWT, missing fields, wrong content-type, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revoke400ErrorResponse"
              examples:
                no_body_or_headers:
                  summary: Missing event body or headers
                  value:
                    error: BAD_REQUEST
                    error_description: "No Event Body or Headers Found"
                missing_content_type:
                  summary: Missing Content-Type header
                  value:
                    error: BAD_REQUEST
                    error_description: "Content-Type header must be application/jwt"
                missing_jti:
                  summary: Missing jti in payload
                  value:
                    error: BAD_REQUEST
                    error_description: "No jti in Payload"
                invalid_jti:
                  summary: Invalid jti format
                  value:
                    error: BAD_REQUEST
                    error_description: "The jti claim is not a lower case uuid string"
                missing_idx:
                  summary: Missing idx in payload
                  value:
                    error: BAD_REQUEST
                    error_description: "No Index in Payload"
                invalid_idx:
                  summary: Invalid idx value
                  value:
                    error: BAD_REQUEST
                    error_description: "Index must be a valid non-negative integer"
                missing_uri:
                  summary: Missing uri in payload
                  value:
                    error: BAD_REQUEST
                    error_description: "No valid URI in Payload"
                invalid_uri_format:
                  summary: Invalid URI format
                  value:
                    error: BAD_REQUEST
                    error_description: "Invalid URI format in payload"
        '401':
          description: Unauthorized (client not found or client mismatch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revoke401ErrorResponse"
              example:
                error: "UNAUTHORIZED"
                error_description: "Unauthorized Request"
        '403':
          description: Forbidden (status list entry not found or issuer mismatch)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revoke403ErrorResponse"
              example:
                error: FORBIDDEN
                error_description: "Unable to revoke the specified status list entry"
        "404":
          description: Entry not found in status list table
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revoke404ErrorResponse"
              example:
                error: "NOT_FOUND"
                error_description: "Entry not found in status list table"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revoke500ErrorResponse"
              examples:
                database_query_error:
                  summary: Database query failure
                  value:
                    error: "INTERNAL_SERVER_ERROR"
                    error_description: "Error querying database for status list entry"
                database_update_error:
                  summary: Database update failure
                  value:
                    error: "INTERNAL_SERVER_ERROR"
                    error_description: "Failed to update revocation status"
        "503":
          description: Service temporarily unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Revoke503ErrorResponse"
              example:
                error: "TEMPORARILY_UNAVAILABLE"
                error_description: "Service is temporarily unavailable"

  # `crs`
  /t/{statusListIdentifier}:
    get:
      description: A public endpoint that returns a signed IETF Token Status List JWT. There is [more guidance and an example response](https://docs.wallet.service.gov.uk/issue-credentials/status-list/statuslist/#token-status-list-request-example).
      parameters:
        - in: path
          name: statusListIdentifier
          schema:
            type: string
            example: "A671FED3E9AD"
          required: true
          description: "Unique name representing the specific status list"
      responses:
        '200':
          description: "OK"
          content:
            application/statuslist+jwt:
              schema:
                type: string
                description: Signed IETF Token Status List JWT containing the status list.
              example: <JWT>
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusList404ErrorResponse"
              example:
                error: NOT_FOUND
                error_description: "Status List not found for endpoint uri"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusList500ErrorResponse"
              example:
                error: INTERNAL_SERVER_ERROR
                error_description: "..."
  # `crs`
  /b/{statusListIdentifier}:
    get:
      description: A public endpoint that returns a signed W3C Bitstring Status List credential JWT. There is [more guidance and an example response](https://docs.wallet.service.gov.uk/issue-credentials/status-list/statuslist/#bitstring-status-list-request-example).
      parameters:
        - in: path
          name: statusListIdentifier
          schema:
            type: string
            example: "A671FED3E9AD"
          required: true
          description: "Unique name representing the specific status list"
      responses:
        '200':
          description: OK
          content:
            application/vc+jwt:
              schema:
                type: string
                description: Signed Bitstring Status List JWT containing the status list.
              example: <JWT>
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusList404ErrorResponse"
              example:
                error: NOT_FOUND
                error_description: "Status List not found for endpoint uri"
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusList500ErrorResponse"
              example:
                error: INTERNAL_SERVER_ERROR
                error_description: "..."
  # `cri`
  /.well-known/openid-credential-issuer:
    get:
      description: A public endpoint for the GOV.UK Wallet to retrieve metadata about the credential issuer.
      responses:
        '200':
          description: Credential issuer's metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MetadataResponse"
              example:
                credential_issuer: https://example-credential-issuer.gov.uk
                authorization_servers:
                  - https://token.account.gov.uk
                credential_endpoint: https://example-credential-issuer.gov.uk/credential
                notification_endpoint: https://example-credential-issuer.gov.uk/notification
                credential_configurations_supported:
                  FishingLicenceCredential:
                    format: mso_mdoc
                    doctype: uk.gov.example-credential-issuer.fishingLicence.1
                    cryptographic_binding_methods_supported:
                      - cose_key
                    credential_signing_alg_values_supported:
                      - ES256
                    credential_refresh_web_journey_url: https://example-credential-issuer.gov.uk/fishing-refresh
                    credential_validity_period_max_days: 90
  # `cri`
  /.well-known/did.json:
    get:
      description: A public endpoint for GOV.UK Wallet and credential verifiers to retrieve the credential issuer's public keys for verifying credentials
      responses:
        '200':
          description: Credential issuer's DID document.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DidResponse"
              example:
                "@context":
                  - https://www.w3.org/ns/did/v1
                  - https://w3id.org/security/suites/jws-2020/v1
                id: did:web:example-credential-issuer.gov.uk
                verificationMethod:
                  - id: did:web:example-credential-issuer.gov.uk#5dcbee863b5d7cc30c9ba1f7393dacc6c16610782e4b6a191f94a7e8b1e1510f
                    type: JsonWebKey2020
                    controller: did:web:example-credential-issuer.gov.uk
                    publicKeyJwk:
                      kty: EC
                      kid: 5dcbee863b5d7cc30c9ba1f7393dacc6c16610782e4b6a191f94a7e8b1e1510f
                      crv: P-256
                      x: 6jCKX_QRrmTeEJi-uiwcYqu8BgMgl70g2pdAst24MPE
                      y: icPzjbSk6apD_SNvQt8NWOPlPeGG4KYU55GfnARryoY
                      alg: ES256
                assertionMethod:
                  - did:web:example-credential-issuer.gov.uk#5dcbee863b5d7cc30c9ba1f7393dacc6c16610782e4b6a191f94a7e8b1e1510f
  # `cri`
  /.well-known/jwks.json:
    get:
      description: |-
        A public endpoint that stores the JSON Web Key Set (JWKS) of public keys issued by a service. These keys can be used by client applications to verify the signature of a JSON Web Token (JWT).
      responses:
        '200':
          description: Credential issuer's JWKS.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JwksResponse"
              example:
                keys:
                  - kty: EC
                    use: sig
                    crv: P-256
                    kid: 5dcbee863b5d7cc30c9ba1f7393dacc6c16610782e4b6a191f94a7e8b1e1510f
                    x: 6jCKX_QRrmTeEJi-uiwcYqu8BgMgl70g2pdAst24MPE=
                    y: icPzjbSk6apD_SNvQt8NWOPlPeGG4KYU55GfnARryoY=
                    alg: ES256
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CredentialRequestBody:
      type: object
      properties:
        proof:
          $ref: "#/components/schemas/Proof"
      required:
        - proof
    Proof:
      type: object
      additionalProperties: false
      properties:
        proof_type:
          type: string
          enum: [jwt]
        jwt:
          type: string
          format: jwt
      required:
        - jwt
        - proof_type
    CredentialResponse:
      type: object
      properties:
        credentials:
          description: An array containing one issued credential.
          type: array
          items:
            $ref: "#/components/schemas/Credential"
        notification_id:
          description: Issuance flow notification ID.
          type: string
          format: uuid
      required:
        - credential
    Credential:
      type: object
      properties:
        credential:
          description: The issued credential.
          type: string
          format: jwt
      required:
        - credential
    Credential400ErrorResponse:
      type: object
      properties:
        error:
          description: An error code, such as `invalid_proof` or `invalid_nonce`.
          type: string
    NotificationRequestBody:
      type: object
      properties:
        notification_id:
          type: string
          format: uuid
        event:
          type: string
          enum:
            - credential_accepted
            - credential_failure
            - credential_deleted
        event_description:
          description: A human-readable explanation of the event.
          type: string
      required:
        - notification_id
        - event
    Notification400ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `invalid_notification_request`, `invalid_notification_id`, or `invalid_request`.
          type: string
          enum:
            - invalid_notification_request
            - invalid_notification_id
            - invalid_request
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    IssueResponse:
      type: object
      properties:
        idx:
          type: number
          minimum: 0
          example: 3
          description: The assigned status list index. This index position is unique within the status list identified by the URI
        uri:
          type: string
          example: "https://crs.account.gov.uk/b/A671FED3E9AD"
          description: The URI of the status list that holds the issued credential. It is used in combination with the index to retrieve the status list entry
      required:
        - idx
        - uri
    Issue400ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `BAD_REQUEST`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Issue401ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `UNAUTHORIZED`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Issue403ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `FORBIDDEN`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Issue409ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `CONFLICT`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Issue500ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `INTERNAL_SERVER_ERROR`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Issue503ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `TEMPORARILY_UNAVAILABLE`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Revoke400ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `BAD_REQUEST`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Revoke401ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `UNAUTHORIZED`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Revoke403ErrorResponse:
      type: object
      properties:
        error:
          description: An error code - must be `FORBIDDEN`.
          type: string
        error_description:
          description: A human-readable explanation of the error.
          type: string
      required:
        - error
    Revoke404ErrorResponse:
      type: object
      properties:
        error:
