    MetadataResponse:
      type: object
      properties:
        credential_issuer:
          description: URL of the credential issuer.
          type: string
          format: uri
        credential_endpoint:
          description: URL of the credential issuer's credential endpoint.
          type: string
          format: uri
        authorization_servers:
          description: Set containing the URL of the authorization server(s) the credential issuer relies on for authorization.
          type: array
          items:
            type: string
            format: uri
        mdoc_iacas_uri:
          description: URL of the credential issuer's Issuing Authority Certification Authority (IACA) endpoint.
          type: string
          format: uri
        notification_endpoint:
          description: URL of the credential issuer's notification endpoint.
          type: string
          format: uri
        credential_configurations_supported:
          $ref: '#/components/schemas/CredentialConfigurationsSupported'
      required:
        - credential_issuer
        - credential_endpoint
        - authorization_servers
        - mdoc_iacas_uri
        - credential_configurations_supported
    CredentialConfigurationsSupported:
      description: Information about the credential(s) issued by the credential issuer.
      type: object
      properties:
        fishingLicence:
          $ref: '#/components/schemas/FishingLicence'
      required:
        - fishingLicence
    FishingLicence:
      description: A credential issued by the credential issuer.
      type: object
      properties:
        format:
          description: Format of the credential.
          type: string
          enum:
            - mso_mdoc
        doctype:
          description: The credential's document type identifier.
          type: string
          example: uk.gov.example-credential-issuer.fishingLicence.1
        cryptographic_binding_methods_supported:
          description: Set of methods available for cryptographically binding the issued credential.
          type: array
          items:
            type: string
            enum:
              - cose_key
        credential_signing_alg_values_supported:
          description: Set of algorithms that the credential issuer uses to sign the credential.
          type: array
          items:
            type: string
            enum:
              - ES256
        credential_refresh_web_journey_url:
          description: The URL where your users can go through the credential refresh web journey in their browser.
          type: string
        credential_validity_period_max_days:
          description: The credential’s validity period in days once it’s issued.
          type: number
      required:
        - format
        - doctype
        - cryptographic_binding_methods_supported
        - credential_signing_alg_values_supported
        - credential_refresh_web_journey_url
        - credential_validity_period_max_days
    DidResponse:
      type: object
      properties:
        '@context':
          description: An array of URL contexts which define the terms used in the DID document.
          type: array
          minItems: 1
          items:
            type: string
            format: uri
        id:
          description: The unique identifier of the DID document.
          type: string
        verificationMethod:
          description: An array of verification methods (cryptographic public keys).
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/VerificationMethod"
        assertionMethod:
          description: Array of DID URLs where each URL uniquely identifies a verification method within the DID document.
          type: array
          minItems: 1
          items:
            type: string
      required:
        - '@context'
        - id
        - verificationMethod
        - assertionMethod
    VerificationMethod:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        controller:
          type: string
        publicKeyJwk:
          $ref: "#/components/schemas/PublicKeyJwk"
      required:
        - id
        - type
        - controller
        - publicKeyJwk
    PublicKeyJwk:
      type: object
      properties:
        kty:
          description: Key Type. The family of cryptographic algorithms used with the key.
          type: string
          enum:
            - EC
        kid:
          description: Key ID. Unique identifier to match a specific key.
          type: string
        crv:
          description: Curve. Cryptographic curve used with the key.
          type: string
          enum:
            - P-256
        x:
          description: The "x" coordinate for the elliptic curve point.
          type: string
        y:
          description: The "y" coordinate for the elliptic curve point.
          type: string
        alg:
          description: Algorithm. The cryptographic algorithm used with the key.
          type: string
          enum:
            - P-256
      required:
        - kty
        - kid
        - crv
        - x
        - y
        - alg
    JwksResponse:
      type: object
      properties:
        keys:
          description: A set of public keys, each in JSON Web Key (JWK) format.
          type: array
          items:
            $ref: '#/components/schemas/Key'
      required:
        - keys
    Key:
      type: object
      properties:
        kty:
          description: Key Type. The family of cryptographic algorithms used with the key.
          type: string
          enum:
            - EC
        kid:
          description: Key ID. Unique identifier to match a specific key.
          type: string
        crv:
          description: Curve. Cryptographic curve used with the key.
          type: string
          enum:
            - P-256
        x:
          description: The "x" coordinate for the elliptic curve point.
          type: string
        y:
          description: The "y" coordinate for the elliptic curve point.
          type: string
        alg:
          description: Algorithm. The cryptographic algorithm used with the key.
          type: string
          enum:
            - P-256
        use:
          description: The intended use of the key.
          type: string
          enum:
            - sig
      required:
        - kty
        - kid
        - crv
        - x
        - y
        - alg
        - use
