# Host to use for canonical URL generation (without trailing slash)
host: 

# Header-related options
show_govuk_logo: true
service_name: Wallet technical documentation
service_link: /
phase: Beta

# Links to show on right-hand-side of header
header_links:
  GOV.UK Wallet technical documentation: /
  Issue credentials: /issue-credentials/
  Verify credentials: /verify-credentials/

  # Links to show in the page footer
footer_links:
  Accessibility: /accessibility-statement.html

# Enables search functionality. This indexes pages only and is not recommended for single-page sites.
enable_search: true

# Tracking ID from Google Analytics (e.g. UA-XXXX-Y)
ga_tracking_id:

# Enable multipage navigation in the sidebar
multipage_nav: true

# generate_unique_page_anchors: false
# Enable collapsible navigation in the sidebar
collapsible_nav: true

# Table of contents depth – how many levels to include in the table of contents.
# If your ToC is too long, reduce this number and we'll only show higher-level
# headings.
max_toc_heading_level: 2

# Prevent robots from indexing (e.g. whilst in development)
prevent_indexing: false

# redirection of old addresses to new pages
redirects:
  /issuing-credentials-to-wallet: /issue-credentials
  /before-integrating.html: /issue-credentials/before-integrating
  /issue-a-credential: /issue-credentials
  /issue-a-credential/authenticate-users: /issue-credentials/authenticate-users
  /issue-a-credential/credential-offer: /issue-credentials/credential-offer
  /issue-a-credential/metadata: /issue-credentials/metadata
  /issue-a-credential/jwks: /issue-credentials/jwks
  /issue-a-credential/credential: /issue-credentials/credential
  /issue-a-credential/did: /issue-credentials/did
  /issue-a-credential/notification: /issue-credentials/notification
  /manage-keys: /issue-credentials/manage-keys
  /status-list: /issue-credentials/status-list
  /status-list/before-issuing-status-record: /issue-credentials/status-list/before-issuing-status-record
  /status-list/issue-status-list-entry: /issue-credentials/status-list/issue-status-list-entry
  /status-list/revoke-credential: /issue-credentials/status-list/revoke-credential
  /status-list/statuslist: /issue-credentials/status-list/statuslist
  /refresh-credentials: /issue-credentials/refresh-credentials
  /refresh-credentials/in-app-refresh.html: /issue-credentials/refresh-credentials/in-app-refresh
  /refresh-credentials/manual-refresh.html: /issue-credentials/refresh-credentials/manual-refresh
  /use-sample-reference-material: /issue-credentials/use-sample-reference-material
  /consuming-and-verifying-credentials: /verify-credentials
  /consuming-and-verifying-credentials/credentials-in-wallet.html: /verify-credentials
  /consuming-and-verifying-credentials/supported-protocols.html: /verify-credentials/#supported-formats-and-protocols

show_contribution_banner: false
github_repo: govuk-one-login/mobile-wallet-tech-docs
github_branch: main

# API description
api_path: ./openapi/cri.yaml
